version: 2
updates:
  # Ruby gems
  - package-ecosystem: bundler
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      rails:
        patterns:
          - "rails"
          - "action*"
          - "active*"
          - "railties"

  # GitHub Actions (keeps the workflows off deprecated action versions)
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
