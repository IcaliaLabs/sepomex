# The behavior of RuboCop can be controlled via the .rubocop.yml
# configuration file. It makes it possible to enable/disable
# certain cops (checks) and to alter their behavior if they accept
# any parameters. The file can be placed either in your home
# directory or in some project directory.
#
# RuboCop will start looking for the configuration file in the directory
# where the inspected file is and continue its way up to the root directory.
#
# See https://docs.rubocop.org/rubocop/configuration
# This is the configuration used by RuboCop. The item 'Enabled' will be read from the default configuration file, but can be overridden in this configuration file. See the RuboCop documentation for more information.

plugins:
  - rubocop-performance
  - rubocop-rails
  - rubocop-rspec

AllCops:
  TargetRubyVersion: 3.4
  TargetRailsVersion: '8.1'
  SuggestExtensions: false
  # Include Ruby source files (plus the default extras). Without the explicit
  # '**/*.rb' the previous list *replaced* RuboCop's default, so no .rb file was
  # ever inspected — which also broke `--force-exclusion` in CI.
  Include:
    - '**/*.rb'
    - '**/*.gemspec'
    - '**/Gemfile'
    - '**/Rakefile'
  # Exclude files that are not part of the project
  Exclude:
    - 'vendor/**/*'
    - 'config/**/*'
    - 'db/**/*'
    - 'log/**/*'
    - 'bin/**/*'

# Pragmatic thresholds for this small API-only app:
Metrics/AbcSize:
  Max: 25

# Don't require a doc comment on every class (Rails-omakase convention).
Style/Documentation:
  Enabled: false

Metrics/MethodLength:
  Max: 15

Metrics/BlockLength:
  Exclude:
    - 'lib/tasks/**/*'
    - 'spec/**/*'

# These are custom named scopes on ZipCode, not dynamic finders.
Rails/DynamicFindBy:
  AllowedMethods:
    - find_by_zip_code
    - find_by_state
    - find_by_city
    - find_by_colony

RSpec/MultipleExpectations:
  Max: 5

RSpec/ExampleLength:
  Max: 15
